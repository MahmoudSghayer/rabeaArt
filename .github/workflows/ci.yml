name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB connection needed).
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # Build needs no runtime secrets: env validation skips the production-build phase
      # (src/instrumentation.ts) and all data-backed pages render error/empty states.
      - name: Build
        run: npm run build

  # Integration + E2E tests need a dedicated test Supabase project. They run only when the
  # repo has TEST_DATABASE_URL configured as a secret — see README "Testing".
  # (Job added in the test milestone; kept out until secrets exist so CI stays green.)
