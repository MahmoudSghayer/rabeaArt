name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege. Without this the workflow inherits the repository default GITHUB_TOKEN
# scope, which on older repos is read-write on contents — far more than a verify pipeline needs.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB connection needed).
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # Build needs no runtime secrets: env validation skips the production-build phase
      # (src/instrumentation.ts) and all data-backed pages render error/empty states.
      - name: Build
        run: npm run build

  # Separate job so a vulnerability advisory never blocks a correctness gate, and vice versa.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Threshold is `high`: as of this pipeline's introduction the tree carries 5 MODERATE
      # transitive advisories (postcss via next, @hono/node-server via @prisma/dev) that are
      # only resolvable by downgrading next itself. Failing on moderate would mean a permanently
      # red pipeline, which trains people to ignore it. Revisit when next ships the postcss bump.
      - name: Dependency audit (high and above)
        run: npm audit --audit-level=high

      # Visibility only — never fails the build, so the moderate advisories above stay on the
      # record instead of being silently tolerated.
      - name: Full advisory report
        if: always()
        run: npm audit || true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Both Playwright projects run on Chromium (see playwright.config.ts), so one browser
      # is all CI needs.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts's webServer builds and starts the app itself, with COMING_SOON=0
      # so the pre-launch gate doesn't swallow every request. Specs needing a seeded database
      # skip themselves unless E2E_HAS_DB=1 — so no database secret is required here.
      - name: E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
